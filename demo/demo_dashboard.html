
<!DOCTYPE html>
<html>
<head>
<title>Demo Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; background: #f4f7fb; padding: 20px; }
.card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
</style>
</head>

<body>

<h1>Demo - Dashboard de Projetos</h1>

<div class="card">
<h2>Demandas por Cliente</h2>
<canvas id="chartCliente"></canvas>
</div>

<div class="card">
<h2>Status</h2>
<canvas id="chartStatus"></canvas>
</div>

<script>
const data = [{"card_id": 1, "titulo": "Integra\u00e7\u00e3o ERP", "cliente": "Cliente Alpha", "status_kanban": "Doing", "bloqueado": false, "priority": "High", "risk": "Medium", "effort": 13, "data_de_entrega": "2026-05-01", "last_activity": "2026-04-18", "tipo": "GERAL"}, {"card_id": 2, "titulo": "Dashboard Comercial", "cliente": "Cliente Beta", "status_kanban": "To Do", "bloqueado": false, "priority": "Medium", "risk": "Low", "effort": 8, "data_de_entrega": "2026-05-10", "last_activity": "2026-04-17", "tipo": "GERAL"}, {"card_id": 3, "titulo": "Corre\u00e7\u00e3o API Financeira", "cliente": "Cliente Alpha", "status_kanban": "Doing", "bloqueado": true, "priority": "High", "risk": "High", "effort": 5, "data_de_entrega": "2026-04-25", "last_activity": "2026-04-18", "tipo": "BLOCK"}, {"card_id": 4, "titulo": "Implanta\u00e7\u00e3o CRM", "cliente": "Cliente Gamma", "status_kanban": "Done", "bloqueado": false, "priority": "High", "risk": "Low", "effort": 21, "data_de_entrega": "2026-04-15", "last_activity": "2026-04-15", "tipo": "GERAL"}, {"card_id": 5, "titulo": "Automa\u00e7\u00e3o Relat\u00f3rios", "cliente": "Cliente Beta", "status_kanban": "Doing", "bloqueado": false, "priority": "Low", "risk": "Low", "effort": 3, "data_de_entrega": "2026-05-03", "last_activity": "2026-04-16", "tipo": "GERAL"}];

function countBy(field) {
  const result = {};
  data.forEach(d => {
    const key = d[field] || "N/A";
    result[key] = (result[key] || 0) + 1;
  });
  return result;
}

const cliente = countBy("cliente");
new Chart(document.getElementById("chartCliente"), {
  type: "bar",
  data: {
    labels: Object.keys(cliente),
    datasets: [{
      data: Object.values(cliente)
    }]
  }
});

const status = countBy("status_kanban");
new Chart(document.getElementById("chartStatus"), {
  type: "doughnut",
  data: {
    labels: Object.keys(status),
    datasets: [{
      data: Object.values(status)
    }]
  }
});
</script>

</body>
</html>
